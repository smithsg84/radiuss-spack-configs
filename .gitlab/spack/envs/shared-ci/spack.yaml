spack:
  #[general--]
  repos:
    ## Use for temporary testing purpose, comment out before merging to main branch:
    #llnl_radiuss: ./spack_repo/llnl_radiuss/
    builtin:
      git: https://github.com/spack/spack-packages.git
      commit: fc0a828957877a44a35e43422f7bf44e4742c8c8
  include:
  - $LCSCHEDCLUSTER/config.yaml
  - $LCSCHEDCLUSTER/packages.yaml
  - ci.yaml
  concretizer:
    reuse: false
    unify: false
  view: false
  #[--general]

  #[config-override--]
  config:
    install_tree:
      root: /usr/workspace/radiuss/install/bradiuss-spack-install-dbv8
      padded_length: 128
      projections:
        all: '{architecture}/{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    'build_stage:':
    - $user_cache_path/stage
    test_stage: $user_cache_path/test
    misc_cache: $user_cache_path/misc
    flags:
      keep_werror: all
  #[--config-override]

  #[definitions--]
  definitions:
  - compilers:
    - +rocm amdgpu_target=gfx906 %llvm-amdgpu@=5.7.1 ^hip@5.7.1
    when: env.get("LCSCHEDCLUSTER", "") == "corona"
  - compilers:
    - '%oneapi-2025-gcc-10'
    - '%clang-19-gcc-13'
    - '%gcc@=13.3.1'
    # matrix spec
    - +cuda cuda_arch=90 %clang-18-gcc-13 ^cuda@12.6.0+allow-unsupported-compilers
    #- +cuda cuda_arch=90 %clang-19-gcc-13 ^cuda@13.1.1+allow-unsupported-compilers
    when: env.get("LCSCHEDCLUSTER", "") == "dane"
  - compilers:
    - +cuda cuda_arch=90 %clang-18-gcc-13 ^cuda@12.6.0+allow-unsupported-compilers
    #- +cuda cuda_arch=90 %clang-19-gcc-13 ^cuda@13.1.1+allow-unsupported-compilers
    when: env.get("LCSCHEDCLUSTER", "") == "matrix"
  - compilers:
    - +rocm amdgpu_target=gfx90a %llvm-amdgpu@=6.4.3 ^hip@6.4.3
    - +rocm amdgpu_target=gfx90a %llvm-amdgpu@=7.2.0 ^hip@7.2.0
    - '%cce@=20.0.0'
    - '%cce@=21.0.0'
    when: env.get("LCSCHEDCLUSTER", "") == "tioga"
  - compilers:
    - +rocm amdgpu_target=gfx942 %llvm-amdgpu@=6.4.3 ^hip@6.4.3
    - +rocm amdgpu_target=gfx942 %llvm-amdgpu@=7.2.0 ^hip@7.2.0
    - '%cce@=20.0.0'
    - '%cce@=21.0.0'
    when: env.get("LCSCHEDCLUSTER", "") == "tuolumne"

  - radiuss-projects:
    - camp
    - umpire
    - raja
    - raja-perf
    - chai
    - care
    - caliper
  - dependencies: []
  #[--definitions]

  specs:
  - matrix:
    - [$radiuss-projects]
    - [$compilers]
    exclude:
    # in spack package, raja-perf@2025.03 asks for c++14, but rocprim 7.2.0 requires c++17.
    - 'raja-perf +rocm amdgpu_target=gfx90a %llvm-amdgpu@=7.2.0 ^hip@7.2.0'
    - 'raja-perf +rocm amdgpu_target=gfx942 %llvm-amdgpu@=7.2.0 ^hip@7.2.0'
